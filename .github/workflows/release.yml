name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.3)"
        required: true
        default: "0.1.3"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
            artifact_name: macos-arm64

          - platform: macos-latest
            target: x86_64-apple-darwin
            rust_targets: x86_64-apple-darwin
            artifact_name: macos-x64

          - platform: macos-latest
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            artifact_name: macos-universal

          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            rust_targets: x86_64-pc-windows-msvc
            artifact_name: windows-x64

          - platform: windows-latest
            target: aarch64-pc-windows-msvc
            rust_targets: aarch64-pc-windows-msvc
            artifact_name: windows-arm64

          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            rust_targets: x86_64-unknown-linux-gnu
            artifact_name: linux-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: test key
        run: echo ${{secrets.TEST_KEY}}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libfuse2

      - name: Install frontend dependencies
        run: npm ci

      - name: Import Apple signing certificate
        if: runner.os == 'macOS' && !contains(matrix.platform, 'self-hosted')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychain -d user -s build.keychain login.keychain
          rm certificate.p12

      - name: Install create-dmg
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg
          sudo ln -sf "$(which create-dmg)" /usr/local/bin/create-dmg

      - name: Setup built-in extensions
        shell: bash
        run: bash scripts/setup-extensions.sh

      - name: Build frontend
        env:
          NODE_OPTIONS: "--max-old-space-size=12288"
        run: npm run build

      - name: Unlock keychain before signing
        if: runner.os == 'macOS'
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain

      - name: Build Tauri app
        timeout-minutes: 40
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target ${{ matrix.target }} --config src-tauri/tauri.release.conf.json

      - name: Collect macOS artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist-artifacts
          find src-tauri/target \( \
            -name "*.dmg" \
            -o -name "*.app.tar.gz" \
            -o -name "*.app.tar.gz.sig" \
          \) -exec cp {} dist-artifacts/ \; 2>/dev/null || true
          ls -la dist-artifacts/

      - name: Collect Windows artifacts
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist-artifacts
          find release/bundle \( \
            -name "*-setup.exe" \
            -o -name "*.exe.zip" \
            -o -name "*.exe.zip.sig" \
          \) -exec cp {} dist-artifacts/ \; 2>/dev/null || true
          ls -la dist-artifacts/

      - name: Collect Linux artifacts
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist-artifacts
          find release/bundle \( \
            -name "*.deb" \
            -o -name "*.AppImage" \
            -o -name "*.AppImage.tar.gz" \
            -o -name "*.AppImage.tar.gz.sig" \
          \) -exec cp {} dist-artifacts/ \; 2>/dev/null || true
          ls -la dist-artifacts/

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}  # 优先用手动输入的 tag
          files: dist-artifacts/*
          name: Release ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
